<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songbull — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .wordmark {
      font-size: 2rem;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c8a84b;
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: block;
      padding: 1.1rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }

    .link-card:hover {
      border-color: #c8a84b;
      background: #1e1e1e;
    }

    .link-card .label {
      font-size: 1rem;
      color: #e8e8e8;
    }

    .link-card .desc {
      font-size: 0.82rem;
      color: #666;
      margin-top: 0.2rem;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">Songbull</div>
    <div class="tagline">by Purple Fern LLC</div>

    <div class="links">
      <a class="link-card" href="/privacy-policy">
        <div class="label">Privacy Policy</div>
        <div class="desc">How we handle your data</div>
      </a>
      <a class="link-card" href="/terms-of-service">
        <div class="label">Terms of Service</div>
        <div class="desc">Rules and agreements for using the App</div>
      </a>
    </div>

    <footer>&copy; 2026 Purple Fern LLC</footer>
  </div>
</body>
</html>
